<script>

const SB='https://qefpnyrumjacrznebtgf.supabase.co',KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZnBueXJ1bWphY3J6bmVidGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTU3MzgsImV4cCI6MjA5ODAzMTczOH0.IbupYWa_yv8M7Ypzui97Fw3pc1VZt_ZEHE2RQvRz6S4';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'};
const TODAY=new Date().toISOString().split('T')[0];
const WS=(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0]})();
const MS=TODAY.slice(0,7)+'-01';
async function sbGet(t,p){const r=await fetch(SB+'/rest/v1/'+t+(p||''),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});if(!r.ok)throw new Error(await r.text());const tx=await r.text();return tx?JSON.parse(tx):[];}
async function sbPost(t,b){const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return[];}
async function sbPatch(t,b,p){const r=await fetch(SB+'/rest/v1/'+t+p,{method:'PATCH',headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return[];}
async function sbDel(t,p){const r=await fetch(SB+'/rest/v1/'+t+p,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());return[];}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){
  const w=document.getElementById('tw');if(!w)return;
  const el=document.createElement('div');el.className='toast show'+(type?' '+type:'');
  el.style.cssText='background:#111;color:#fff;padding:.5rem .875rem;font-size:12px;border-left:3px solid '+(type==='err'?'#ef4444':'#4BBFE8')+';margin-top:.375rem;animation:fadeUp .2s ease';
  el.textContent=(type==='err'?'✕ ':'✓ ')+msg;
  w.appendChild(el);setTimeout(()=>el.remove(),2600);
}
async function ping(){
  const dot=document.getElementById('sb-dot'),txt=document.getElementById('sb-txt');
  if(!dot)return;
  const t=Date.now();
  try{
    await fetch(SB+'/rest/v1/projects?select=id&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const d=Date.now()-t;
    dot.style.background='#22c55e';dot.style.boxShadow='0 0 4px rgba(34,197,94,.4)';
    if(txt)txt.textContent='En ligne · '+d+'ms';
  }catch(e){if(dot)dot.style.background='#ef4444';if(txt)txt.textContent='Hors ligne';}
}

const WHO='ak';
let PROJS=[],PA=[],EDITING=null,formOpen=false;

window.addEventListener('DOMContentLoaded',async()=>{
  ping();
  document.getElementById('f-date').value=TODAY;
  await loadProjects();
  await fetchActions();
});

async function loadProjects(){
  try{
    PROJS=await sbGet('projects','?order=created_at.asc&select=*,subtasks(*)');
    const sel=document.getElementById('f-proj');
    sel.innerHTML='<option value="">Choisissez un projet…</option>';
    PROJS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;sel.appendChild(o);});
    const fp=document.getElementById('f-filter-proj');
    fp.innerHTML='<option value="">Tous les projets</option>';
    PROJS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;fp.appendChild(o);});
  }catch(e){}
}

function loadST(){
  const pid=document.getElementById('f-proj').value;
  const sel=document.getElementById('f-st');
  sel.innerHTML='<option value="">— Aucune —</option>';
  if(!pid)return;
  const p=PROJS.find(x=>x.id===pid);
  if(p&&p.subtasks)p.subtasks.forEach(st=>{const o=document.createElement('option');o.value=st.id;o.textContent=st.name;sel.appendChild(o);});
}

function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('action-form').classList.toggle('open',formOpen);
  if(formOpen&&!EDITING){
    document.getElementById('f-date').value=TODAY;
    document.getElementById('f-proj').value='';
    document.getElementById('f-st').innerHTML='<option value="">— Aucune —</option>';
  }
}

async function fetchActions(){
  try{
    PA=await sbGet('actions','?who=eq.'+WHO+'&order=date.desc,created_at.desc&select=*,projects(name),subtasks(name)');
    const tot=PA.length,month=PA.filter(a=>a.date>=MS).length,week=PA.filter(a=>a.date>=WS).length;
    document.getElementById('st-total').textContent=tot;
    document.getElementById('st-month').textContent=month;
    document.getElementById('st-week').textContent=week;
    document.getElementById('cnt-tab').textContent=tot;
    filterActions();
  }catch(e){document.getElementById('action-list').innerHTML='<div class="loading">Erreur de chargement</div>';}
}

function filterActions(){
  const fp=document.getElementById('f-filter-proj').value;
  const acts=fp?PA.filter(a=>a.project_id===fp):PA;
  document.getElementById('cnt-list').textContent=acts.length+' action'+(acts.length>1?'s':'');
  renderActions(acts);
}

function renderActions(acts){
  const el=document.getElementById('action-list');
  if(!acts.length){
    el.innerHTML='<div class="empty"><span class="empty-icon">📭</span><div class="empty-title">Aucune action</div><div class="empty-sub">Cliquez sur "+ Nouvelle action" pour commencer</div></div>';
    return;
  }
  el.innerHTML='';
  acts.forEach((a,i)=>{
    const card=document.createElement('div');
    card.className='comm-card';
    card.style.animationDelay=(i*.04)+'s';
    card.innerHTML=
      '<div class="card-bloc">'+esc(a.projects?.name||'')+(a.subtasks?'<span>—</span>'+esc(a.subtasks.name):'')+'</div>'+
      '<div class="card-subject">'+esc(a.description.slice(0,80))+(a.description.length>80?'…':'')+'</div>'+
      '<div class="card-body">'+esc(a.description)+'</div>'+
      '<div class="card-footer">'+
        '<div class="card-tags">'+
          '<span class="tag tag-cyan">'+esc(a.projects?.name||'')+'</span>'+
          (a.subtasks?'<span class="tag tag-violet">'+esc(a.subtasks.name)+'</span>':'')+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">'+
          '<span class="card-date">'+a.date+'</span>'+
          '<button class="btn-ghost" onclick="editAction(''+a.id+'')">Modifier</button>'+
          '<button class="btn-ghost danger" onclick="delAction(''+a.id+'')">✕</button>'+
        '</div>'+
      '</div>';
    el.appendChild(card);
  });
}

async function submitAction(){
  const date=document.getElementById('f-date').value;
  const pid=document.getElementById('f-proj').value;
  const stid=document.getElementById('f-st').value;
  const desc=document.getElementById('f-desc').value.trim();
  if(!date||!pid||!desc){toast('Date, projet et description requis','err');return;}
  const btn=document.getElementById('f-submit');btn.disabled=true;
  try{
    if(EDITING){
      await sbPatch('actions',{date,project_id:pid,subtask_id:stid||null,description:desc},'?id=eq.'+EDITING);
      toast('Action modifiée');EDITING=null;
      document.getElementById('form-title').textContent='Nouvelle action';
      document.getElementById('f-submit').textContent='Enregistrer →';
    }else{
      await sbPost('actions',{id:uid(),who:WHO,date,project_id:pid,subtask_id:stid||null,description:desc});
      toast('Action ajoutée');
    }
    document.getElementById('f-desc').value='';
    toggleForm();await fetchActions();
  }catch(e){toast('Erreur: '+e.message,'err');}
  btn.disabled=false;
}

async function editAction(id){
  const a=PA.find(x=>x.id===id);if(!a)return;
  EDITING=id;
  if(!formOpen)toggleForm();
  document.getElementById('f-date').value=a.date;
  document.getElementById('f-proj').value=a.project_id||'';
  loadST();
  setTimeout(()=>{document.getElementById('f-st').value=a.subtask_id||'';},80);
  document.getElementById('f-desc').value=a.description;
  document.getElementById('form-title').textContent="Modifier l'action";
  document.getElementById('f-submit').textContent='Mettre à jour →';
  window.scrollTo(0,0);
}

async function delAction(id){
  if(!confirm('Supprimer cette action ?'))return;
  try{await sbDel('actions','?id=eq.'+id);toast('Supprimée');await fetchActions();}
  catch(e){toast('Erreur','err');}
}
</script>
</body></html>
