  btn.innerHTML = formOpen
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Fermer'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nouvelle action';
  if (formOpen && !EDITING) { document.getElementById('f-date').value = TODAY; fillSel('f-proj'); }
}

function loadFormST() {
  const pid = document.getElementById('f-proj').value;
  const sel = document.getElementById('f-st');
  sel.innerHTML = '<option value="">— Aucune —</option>';
  if (!pid) return;
  const p = PROJS.find(x => x.id === pid);
  if (p && p.subtasks) p.subtasks.forEach(st => { const o = document.createElement('option'); o.value = st.id; o.textContent = st.name; sel.appendChild(o); });
}

async function fetchPA() {
  try {
    PA = await GET('actions', '?who=eq.hz&order=date.desc,created_at.desc&select=*,projects(name),subtasks(name)');
    document.getElementById('ps-tot').textContent   = PA.length;
    document.getElementById('ps-month').textContent = PA.filter(a => a.date >= MS).length;
    document.getElementById('ps-week').textContent  = PA.filter(a => a.date >= WS).length;
    filterPA();
  } catch(e) { document.getElementById('person-list').innerHTML = '<div class="loading-row"><div class="spinner"></div> Erreur</div>'; }
}

function filterPA() {
  const fp = document.getElementById('p-fproj').value;
  const acts = fp ? PA.filter(a => a.project_id === fp) : PA;
  document.getElementById('p-cnt').textContent = acts.length;
  renderList('person-list', acts, WHO, true);
}

async function submitAction() {
  const date = document.getElementById('f-date').value;
  const pid  = document.getElementById('f-proj').value;
  const stid = document.getElementById('f-st').value;
  const desc = document.getElementById('f-desc').value.trim();
  if (!date || !pid || !desc) { toast('Date, projet et description requis', 'err'); return; }
  const btn = document.getElementById('f-submit'); btn.disabled = true;
  try {
    if (EDITING) {
      await PATCH('actions', { date, project_id: pid, subtask_id: stid || null, description: desc }, '?id=eq.' + EDITING);
      toast('Action modifiée'); EDITING = null;
      document.getElementById('f-lbl').textContent = 'Enregistrer';
      document.getElementById('form-ttl').textContent = 'Nouvelle action';
    } else {
      await POST('actions', { id: uid(), who: WHO, date, project_id: pid, subtask_id: stid || null, description: desc });
      toast('Action ajoutée');
    }
    document.getElementById('f-desc').value = '';
    document.getElementById('f-proj').value = '';
    document.getElementById('f-st').innerHTML = '<option value="">— Aucune —</option>';
    if (formOpen) toggleForm();
    await fetchPA();
  } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  btn.disabled = false;
}

async function editAct(id) {
  const a = PA.find(x => x.id === id); if (!a) return;
  EDITING = id;
  if (!formOpen) toggleForm();
  document.getElementById('f-date').value = a.date;
  fillSel('f-proj'); document.getElementById('f-proj').value = a.project_id || '';
  loadFormST(); setTimeout(() => { document.getElementById('f-st').value = a.subtask_id || ''; }, 80);
  document.getElementById('f-desc').value = a.description;
  document.getElementById('f-lbl').textContent = 'Mettre à jour';
  document.getElementById('form-ttl').textContent = "Modifier l'action";
  window.scrollTo(0, 0);
}

async function delAct(id) {
  if (!confirm('Supprimer cette action définitivement ?')) return;
  try { await DEL('actions', '?id=eq.' + id); toast('Action supprimée'); await fetchPA(); }
  catch(e) { toast('Erreur', 'err'); }
}
</script>
</body>
</html>
