<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SWAM Online Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--paper:#fff;--ink:#111315;--ink-soft:#5B6066;--ink-faint:#9A9FA6;--line:#E4E5E7;--line-strong:#D0D2D6;--accent:#0095B6;--accent-tint:#EAF6F9;--danger:#C81E3A;--success:#1A7F4E;--violet:#6B21A8;--font:"Inter",system-ui,sans-serif;--font-mono:"Space Mono",monospace;--transition:.15s ease}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh}

.portal{width:100%;max-width:440px;padding:2rem;animation:fadeUp .4s ease both}
.portal-logo{display:flex;justify-content:center;margin-bottom:40px}
.portal-logo img{height:44px;width:auto}
.portal-masthead{margin-bottom:40px}
.portal-title{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1.1;color:var(--ink)}
.portal-sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-top:8px}
.portal-divider{height:1px;background:var(--ink);margin-bottom:32px}
.portal-section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.portal-section-label::after{content:'';flex:1;height:1px;background:var(--line)}
.portal-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--line);border-top:2px solid var(--ink);background:var(--paper);cursor:pointer;text-align:left;text-decoration:none;transition:all var(--transition);width:100%;font-family:var(--font);margin-bottom:8px}
.portal-btn:hover{border-top-color:var(--accent);background:var(--accent-tint)}
.portal-btn.public{border-top-color:var(--accent)}
.portal-av{width:40px;height:40px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--font-mono)}
.portal-av.cyan{background:var(--accent)}
.portal-av.violet{background:var(--violet)}
.portal-av.grad{background:linear-gradient(135deg,var(--accent),var(--violet))}
.portal-name{font-size:13px;font-weight:700;color:var(--ink);display:block}
.portal-role{font-size:11px;color:var(--ink-faint);display:block;margin-top:2px;font-family:var(--font-mono)}
.portal-arrow{margin-left:auto;font-size:20px;color:var(--line-strong);line-height:1}
.portal-btn:hover .portal-arrow{color:var(--accent)}

/* Modal */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.pw-modal{background:var(--paper);width:100%;max-width:400px;padding:40px;animation:fadeUp .2s ease}
.pw-mhdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px}
.pw-mtitle{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.pw-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink-faint);line-height:1;padding:0;font-family:var(--font-mono)}
.pw-close:hover{color:var(--ink)}
.tabs-row{display:flex;border-bottom:1px solid var(--line);margin-bottom:24px;gap:0}
.tab-btn{padding:8px 0;margin-right:20px;font-size:11px;font-weight:700;color:var(--ink-faint);border:none;background:none;cursor:pointer;font-family:var(--font-mono);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all var(--transition);text-transform:uppercase;letter-spacing:.08em}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent)}
.pw-field{margin-bottom:20px}
.pw-field label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink);margin-bottom:6px;font-family:var(--font-mono)}
.pw-field input{width:100%;border:none;border-bottom:1px solid var(--line-strong);padding:8px 0;font-size:14px;color:var(--ink);background:transparent;outline:none;font-family:var(--font);transition:border-color var(--transition)}
.pw-field input:focus{border-bottom-color:var(--accent)}
.err-msg{font-size:12px;color:var(--danger);background:#FEF2F2;border-left:3px solid var(--danger);padding:7px 10px;margin-bottom:12px;display:none}
.err-msg.show{display:block}
.ok-msg{font-size:12px;color:var(--success);background:#F0FDF4;border-left:3px solid var(--success);padding:7px 10px;margin-bottom:12px;display:none}
.ok-msg.show{display:block}
.pw-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.btn-primary{background:var(--ink);color:#fff;border:none;padding:10px 22px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:.02em;transition:background var(--transition)}
.btn-primary:hover{background:var(--accent)}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);padding:10px 16px;font-size:11px;font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all var(--transition)}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
</style>
</head>

    <div><span class="portal-name">Mohamed Amine BENNCAR</span><span class="portal-role">Manager · Vue globale</span></div>
    <span class="portal-arrow">›</span>
  </button>

  <div class="portal-section-label" style="margin-top:16px">Équipe RUN</div>
  <button class="portal-btn" onclick="openModal('ak')">
    <div class="portal-av cyan">AN</div>
    <div><span class="portal-name">Abdelkader NAIM</span><span class="portal-role">RUN Online SWAM</span></div>

  </button>
  <button class="portal-btn" onclick="openModal('hz')">
    <div class="portal-av violet">HE</div>

<!-- MODAL -->
<div class="pw-overlay hidden" id="pw-overlay" onclick="if(event.target===this)closeModal()">
  <div class="pw-modal">
    <div class="pw-mhdr">
      <div class="pw-mtitle" id="pw-title">Connexion</div>
      <button class="pw-close" onclick="closeModal()">×</button>
    </div>
    <div class="tabs-row">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab-btn" id="tab-reset" onclick="switchTab('reset')">Mot de passe oublié</button>
    </div>

    <div id="pane-login">
      <div class="err-msg" id="err-login"></div>
      <div class="pw-field"><label>Identifiant</label><input type="text" id="inp-user" autocomplete="username"></div>
      <div class="pw-field"><label>Mot de passe</label><input type="password" id="inp-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="pw-footer">
        <button class="btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="doLogin()">Connexion →</button>
      </div>
    </div>

    <div id="pane-reset" class="hidden">
      <div class="err-msg" id="err-reset"></div>
      <div class="ok-msg" id="ok-reset">Contactez votre administrateur pour réinitialiser votre mot de passe.</div>
      <div class="pw-footer">
        <button class="btn-ghost" onclick="closeModal()">Fermer</button>
      </div>
    </div>
  </div>
</div>

<script>
const CREDS={manager:{pass:'swam2026',dest:'manager.html'},ak:{pass:'run2026',dest:'abdelkader.html'},hz:{pass:'run2026',dest:'hamza.html'}};
let _target=null;

function openModal(role){
  _target=role;
  document.getElementById('pw-title').textContent=role==='manager'?'Mohamed Amine BENNCAR':role==='ak'?'Abdelkader NAIM':'Hamza EL HAYJ';
  document.getElementById('inp-user').value='';document.getElementById('inp-pass').value='';
  document.getElementById('err-login').classList.remove('show');
  switchTab('login');
  document.getElementById('pw-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('inp-user').focus(),50);
}
function closeModal(){document.getElementById('pw-overlay').classList.add('hidden');}
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reset').classList.toggle('active',t==='reset');
  document.getElementById('pane-login').classList.toggle('hidden',t!=='login');
  document.getElementById('pane-reset').classList.toggle('hidden',t!=='reset');
  if(t==='reset'){document.getElementById('ok-reset').classList.add('show');}
}
function doLogin(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  const c=CREDS[_target];
  if(!c)return;
  if((u===_target||u===c.dest.split('.')[0])&&p===c.pass){
    sessionStorage.setItem('swam_auth',_target);
    window.location.href=c.dest;
  } else {
    const el=document.getElementById('err-login');el.textContent='Identifiant ou mot de passe incorrect.';el.classList.add('show');
    document.getElementById('pw-modal')?.classList.add('shake');
    setTimeout(()=>document.getElementById('pw-modal')?.classList.remove('shake'),350);
  }
}
</script>
