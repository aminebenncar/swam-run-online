<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWAM — RUN Online</title>
<link rel="stylesheet" href="style.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem;width:100%;max-width:440px;padding:2rem}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem;animation:float 4s ease-in-out infinite}
.login-tagline{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:.25rem}
.login-card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--bd);border-radius:var(--r2);padding:2rem;width:100%;box-shadow:0 20px 60px rgba(75,191,232,.1),0 4px 16px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9)}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:.25rem;color:var(--text)}
.login-card p{font-size:13px;color:var(--text3);margin-bottom:1.5rem}
.login-sep{display:flex;align-items:center;gap:.625rem;margin:.75rem 0}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--bd)}
.login-sep span{font-size:11px;color:var(--text3)}
.lbtn{display:flex;align-items:center;gap:.875rem;padding:.875rem 1rem;border:1px solid var(--bd);border-radius:var(--r);background:#fff;cursor:pointer;width:100%;margin-bottom:.5rem;transition:all .22s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow);text-decoration:none}
.lbtn:last-child{margin-bottom:0}
.lbtn:hover{border-color:rgba(75,191,232,.4);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.lbtn:active{transform:scale(.98)}
.lbtn-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av-grad{background:var(--grad)}.av-dark{background:linear-gradient(135deg,#2D3748,#4A5568)}
.lbtn-info{flex:1}
.lbtn-name{font-size:13px;font-weight:600;color:var(--text);display:block}
.lbtn-role{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.lbtn-arrow{color:var(--text3);transition:transform .2s;flex-shrink:0}
.lbtn:hover .lbtn-arrow{transform:translateX(3px);color:var(--c2)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(15,17,23,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:var(--r2);padding:2rem;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.18);border:1px solid var(--bd);animation:scaleIn .2s cubic-bezier(.22,1,.36,1)}
.modal-av{width:52px;height:52px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;margin:0 auto 1rem}
.modal-av.dark{background:linear-gradient(135deg,#2D3748,#4A5568)}
.modal h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.25rem;text-align:center}
.modal .sub{font-size:12px;color:var(--text3);margin-bottom:1.375rem;text-align:center}
.pw-wrap{position:relative;margin-bottom:.75rem}
.pw-wrap input{width:100%;border:1.5px solid var(--bd);border-radius:10px;padding:10px 42px 10px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:all .2s;background:#F4F6FB}
.pw-wrap input:focus{border-color:rgba(75,191,232,.6);background:#fff;box-shadow:0 0 0 3px rgba(75,191,232,.12)}
.pw-wrap label{display:block;font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.eye-btn{position:absolute;right:10px;bottom:10px;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:flex}
.eye-btn:hover{color:var(--text)}
.err{font-size:12px;color:#DC2626;margin-bottom:.75rem;display:none;align-items:center;gap:.375rem;background:#FEF2F2;padding:8px 10px;border-radius:8px;border:1px solid #FCA5A5}
.err.show{display:flex}
.ok-msg{font-size:12px;color:#059669;margin-bottom:.75rem;display:none;align-items:center;gap:.375rem;background:#F0FDF4;padding:8px 10px;border-radius:8px;border:1px solid #6EE7B7}
.ok-msg.show{display:flex}
.modal-btns{display:flex;gap:.5rem;margin-top:1.125rem}
.modal-btns .btn-grad{flex:1;justify-content:center;padding:10px}
.modal-btns .btn-ghost{padding:10px 14px}
.tab-row{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:3px;margin-bottom:1.25rem}
.tab-btn{flex:1;padding:7px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:inherit;transition:all .2s;font-weight:500}
.tab-btn.active{background:#fff;color:var(--c2);box-shadow:var(--shadow);border:1px solid var(--bd)}
.divider{height:1px;background:var(--bd);margin:.875rem 0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .35s ease}
</style>
</head>

        <button class="btn-ghost" onclick="closeModal()">Annuler</button>

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Accéder
        </button>
      </div>
    </div>

    <!-- ── ONGLET CHANGER MDP ── -->
    <div id="pane-chpw" class="hidden">
      <div class="pw-wrap">
        <label>Mot de passe actuel</label>
        <input type="password" id="pw-current" placeholder="Mot de passe actuel…">
        <button class="eye-btn" type="button" onclick="toggleEye('pw-current',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="pw-wrap">
        <label>Nouveau mot de passe</label>
        <input type="password" id="pw-new" placeholder="Nouveau mot de passe…">
        <button class="eye-btn" type="button" onclick="toggleEye('pw-new',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="pw-wrap">
        <label>Confirmer le nouveau mot de passe</label>
        <input type="password" id="pw-confirm" placeholder="Confirmez le mot de passe…"
          onkeydown="if(event.key==='Enter')tryChangePw()">
        <button class="eye-btn" type="button" onclick="toggleEye('pw-confirm',this)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="err" id="err-chpw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="err-chpw-txt">Erreur</span>
      </div>
      <div class="ok-msg" id="ok-chpw">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Mot de passe modifié avec succès !
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn-grad" onclick="tryChangePw()" id="btn-savepw">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Enregistrer
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const SB  = 'https://qefpnyrumjacrznebtgf.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZnBueXJ1bWphY3J6bmVidGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTU3MzgsImV4cCI6MjA5ODAzMTczOH0.IbupYWa_yv8M7Ypzui97Fw3pc1VZt_ZEHE2RQvRz6S4';
const H   = { 'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation' };

const PAGES = { manager:'manager.html', ak:'abdelkader.html', hz:'hamza.html' };
const NAMES = { manager:'Mohamed Amine BENNCAR', ak:'Abdelkader NAIM', hz:'Hamza EL HAYJ' };
const INITS = { manager:null, ak:'AN', hz:'HE' };

/* Mots de passe de secours si Supabase inaccessible */
const FALLBACK_PW = { manager:'Manager2024!', ak:'Abdelkader2024!', hz:'Hamza2024!' };

let WHO = null;
let PASSWORDS_CACHE = {};

/* ── CHARGER LES MDP DEPUIS SUPABASE ── */
async function loadPasswords() {
  try {
    const r = await fetch(SB + '/rest/v1/passwords?select=who,password', { headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY } });
    if (!r.ok) throw new Error();
    const rows = await r.json();
    rows.forEach(row => { PASSWORDS_CACHE[row.who] = row.password; });
  } catch(e) {
    /* Fallback sur les mots de passe locaux */
    PASSWORDS_CACHE = { ...FALLBACK_PW };
  }
}

/* ── MODAL ── */
function openModal(who) {
  WHO = who;
  const av = document.getElementById('m-av');
  if (who === 'manager') {
    av.className = 'modal-av dark';
    av.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
  } else {
    av.className = 'modal-av';
    av.textContent = INITS[who];
  }
  document.getElementById('m-title').textContent = NAMES[who];
  document.getElementById('m-sub').textContent   = 'Connectez-vous à votre espace';
  switchTab('login');
  resetFields();
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('pw-login').focus(), 120);
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  WHO = null;
  resetFields();
}

function closeOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function resetFields() {
  ['pw-login','pw-current','pw-new','pw-confirm'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('err-login').classList.remove('show');
  document.getElementById('err-chpw').classList.remove('show');
  document.getElementById('ok-chpw').classList.remove('show');
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-chpw').classList.toggle('active', tab === 'chpw');
  document.getElementById('pane-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('pane-chpw').classList.toggle('hidden', tab !== 'chpw');
  document.getElementById('err-login').classList.remove('show');
  document.getElementById('err-chpw').classList.remove('show');
  document.getElementById('ok-chpw').classList.remove('show');
  setTimeout(() => {
    if (tab === 'login') document.getElementById('pw-login').focus();
    else document.getElementById('pw-current').focus();
  }, 80);
}

function toggleEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.style.color = show ? 'var(--c2)' : 'var(--text3)';
}

/* ── CONNEXION ── */
function tryLogin() {
  const pw = document.getElementById('pw-login').value;
  const stored = PASSWORDS_CACHE[WHO] || FALLBACK_PW[WHO];
  if (pw === stored) {
    sessionStorage.setItem('swam_auth', WHO);
    window.location.href = PAGES[WHO];
  } else {
    const inp = document.getElementById('pw-login');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 400);
    document.getElementById('err-login').classList.add('show');
    inp.select();
  }
}

/* ── CHANGER MOT DE PASSE ── */
async function tryChangePw() {
  const current = document.getElementById('pw-current').value;
  const newPw   = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  const errEl   = document.getElementById('err-chpw');
  const errTxt  = document.getElementById('err-chpw-txt');
  const okEl    = document.getElementById('ok-chpw');
  const btn     = document.getElementById('btn-savepw');

  errEl.classList.remove('show');
  okEl.classList.remove('show');

  const stored = PASSWORDS_CACHE[WHO] || FALLBACK_PW[WHO];

  if (current !== stored) {
    errTxt.textContent = 'Mot de passe actuel incorrect';
    errEl.classList.add('show');
    document.getElementById('pw-current').classList.add('shake');
    setTimeout(() => document.getElementById('pw-current').classList.remove('shake'), 400);
    return;
  }
  if (newPw.length < 6) {
    errTxt.textContent = 'Le nouveau mot de passe doit contenir au moins 6 caractères';
    errEl.classList.add('show');
    return;
  }
  if (newPw !== confirm) {
    errTxt.textContent = 'Les mots de passe ne correspondent pas';
    errEl.classList.add('show');
    document.getElementById('pw-confirm').classList.add('shake');
    setTimeout(() => document.getElementById('pw-confirm').classList.remove('shake'), 400);
    return;
  }

  btn.disabled = true;
  btn.style.opacity = '.6';

  try {
    const r = await fetch(SB + '/rest/v1/passwords?who=eq.' + WHO, {
      method: 'PATCH',
      headers: H,
      body: JSON.stringify({ password: newPw })
    });
    if (!r.ok) throw new Error('Erreur Supabase');
    PASSWORDS_CACHE[WHO] = newPw;
    okEl.classList.add('show');
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    setTimeout(() => { okEl.classList.remove('show'); switchTab('login'); }, 2500);
  } catch(e) {
    errTxt.textContent = 'Erreur de connexion. Réessayez.';
    errEl.classList.add('show');
  }

  btn.disabled = false;
  btn.style.opacity = '1';
}

/* ── INIT ── */
loadPasswords();
</script>
</body>
</html>
