<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SWAM Online Hub</title>
<link rel="stylesheet" href="hub-style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.portal{width:100%;max-width:420px;padding:2rem;text-align:center}
.portal-logo{margin-bottom:1.5rem;display:flex;justify-content:center}
.portal-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:.375rem;color:#111}
.portal-sub{font-size:13px;color:#888;margin-bottom:2rem;font-family:var(--mono)}
.portal-btns{display:flex;flex-direction:column;gap:.5rem;text-align:left}
.portal-sep{display:flex;align-items:center;gap:.75rem;margin:.25rem 0}
.portal-sep::before,.portal-sep::after{content:'';flex:1;height:1px;background:#e5e5e5}
.portal-sep span{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);white-space:nowrap}
.portal-btn{display:flex;align-items:center;gap:.875rem;padding:.875rem 1.125rem;border:1.5px solid #e5e5e5;background:#fff;cursor:pointer;text-align:left;text-decoration:none;transition:all .15s;width:100%;font-family:inherit}
.portal-btn:hover{border-color:#111;background:#fafafa}
.portal-btn.public{border-color:rgba(75,191,232,.3)}
.portal-btn.public:hover{border-color:var(--cyan)}
.portal-av{width:40px;height:40px;background:#111;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--mono)}
.portal-av.cyan{background:var(--cyan)}
.portal-av.violet{background:var(--violet)}
.portal-av.grad{background:linear-gradient(135deg,var(--cyan),var(--violet))}
.portal-name{font-size:13px;font-weight:700;color:#111;display:block}
.portal-role{font-size:11px;color:#888;display:block;margin-top:1px;font-family:var(--mono)}
.portal-arrow{margin-left:auto;font-size:18px;color:#ccc;line-height:1}
.portal-btn:hover .portal-arrow{color:#111}
/* Modal */
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.pw-modal{background:#fff;width:100%;max-width:380px;padding:2rem}
.pw-mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.pw-mtitle{font-size:18px;font-weight:800;color:#111;letter-spacing:-.3px}
.pw-close{background:none;border:none;cursor:pointer;font-size:22px;color:#aaa;line-height:1;padding:0}
.pw-close:hover{color:#111}
.tabs-row{display:flex;border-bottom:1.5px solid #e5e5e5;margin-bottom:1.25rem;gap:0}
.tab-btn{padding:.5rem 0;margin-right:1.25rem;font-size:11px;font-weight:700;color:#888;border:none;background:none;cursor:pointer;font-family:var(--mono);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;text-transform:uppercase;letter-spacing:.06em}
.tab-btn.active{color:#111;border-bottom-color:var(--cyan)}
.pw-field{margin-bottom:1rem}
.pw-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#111;margin-bottom:5px;font-family:var(--mono)}
.pw-field input{width:100%;border:none;border-bottom:1.5px solid #ccc;padding:8px 0;font-size:14px;color:#111;background:transparent;outline:none;font-family:inherit;transition:border-color .15s}
.pw-field input:focus{border-bottom-color:#111}
.err-msg{font-size:12px;color:#dc2626;background:#fef2f2;border-left:3px solid #dc2626;padding:7px 10px;margin-bottom:.75rem;display:none}
.err-msg.show{display:block}
.ok-msg{font-size:12px;color:#16a34a;background:#f0fdf4;border-left:3px solid #22c55e;padding:7px 10px;margin-bottom:.75rem;display:none}
.ok-msg.show{display:block}
.pw-footer{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid #e5e5e5}
.hidden{display:none!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
.shake{animation:shake .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.portal-logo,.portal-title,.portal-sub{animation:fadeUp .4s ease both}
.portal-btns{animation:fadeUp .4s ease .1s both}
</style>
</head>

async function sbGet(t,p){const r=await fetch(SB+'/rest/v1/'+t+(p||''),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});if(!r.ok)throw new Error();const tx=await r.text();return tx?JSON.parse(tx):[];}
async function sbPatch(t,b,p){const r=await fetch(SB+'/rest/v1/'+t+p,{method:'PATCH',headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error();}

const PAGES={manager:'manager.html',ak:'abdelkader.html',hz:'hamza.html'};
const NAMES={manager:'Mohamed Amine BENNCAR',ak:'Abdelkader NAIM',hz:'Hamza EL HAYJ'};
const FB={manager:'Manager2024!',ak:'Abdelkader2024!',hz:'Hamza2024!'};
let WHO=null,PW={};

async function loadPW(){
  try{
    const rows=await sbGet('passwords','?select=who,password');
    rows.forEach(x=>{PW[x.who]=x.password;});
  }catch(e){PW={...FB};}
}

function openModal(who){
  WHO=who;
  document.getElementById('pw-name').textContent=NAMES[who];
  switchTab('l');
  ['pw-in','pw-cur','pw-new2','pw-conf'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('err-l').classList.remove('show');
  document.getElementById('pw-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('pw-in').focus(),100);
}
function closeModal(){document.getElementById('pw-overlay').classList.add('hidden');WHO=null;}
function switchTab(t){
  document.getElementById('tab-l').classList.toggle('active',t==='l');
  document.getElementById('tab-c').classList.toggle('active',t==='c');
  document.getElementById('pane-l').classList.toggle('hidden',t!=='l');
  document.getElementById('pane-c').classList.toggle('hidden',t!=='c');
}
function tryLogin(){
  const pw=document.getElementById('pw-in').value;
  const stored=PW[WHO]||FB[WHO];
  if(pw===stored){sessionStorage.setItem('swam_auth',WHO);window.location.href=PAGES[WHO];}
  else{
    const i=document.getElementById('pw-in');
    i.classList.add('shake');setTimeout(()=>i.classList.remove('shake'),350);
    document.getElementById('err-l').classList.add('show');
  }
}
async function tryChange(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new2').value;
  const cf=document.getElementById('pw-conf').value;
  const errEl=document.getElementById('err-c');
  errEl.classList.remove('show');document.getElementById('ok-c').classList.remove('show');
  const stored=PW[WHO]||FB[WHO];
  if(cur!==stored){errEl.textContent='Mot de passe actuel incorrect.';errEl.classList.add('show');return;}
  if(nw.length<6){errEl.textContent='Au moins 6 caractères requis.';errEl.classList.add('show');return;}
  if(nw!==cf){errEl.textContent='Les mots de passe ne correspondent pas.';errEl.classList.add('show');return;}
  try{
    await sbPatch('passwords',{password:nw},'?who=eq.'+WHO);
    PW[WHO]=nw;
    document.getElementById('ok-c').classList.add('show');
    ['pw-cur','pw-new2','pw-conf'].forEach(id=>document.getElementById(id).value='');
    setTimeout(()=>{document.getElementById('ok-c').classList.remove('show');switchTab('l');},2500);
  }catch(e){errEl.textContent='Erreur de connexion.';errEl.classList.add('show');}
}

}
ping();loadPW();
