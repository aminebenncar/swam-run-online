<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SWAM — Manager</title>
<link rel="stylesheet" href="hub-style.css">
<script>(function(){var a=sessionStorage.getItem('swam_auth');if(a!=='manager')window.location.replace('index.html');})();</script>
<style>
.page-content{padding:2rem;background:#fff;min-height:calc(100vh - 115px)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid #e5e5e5;border-top:3px solid #111;padding:1rem 1.125rem}
.stat-card.accent{border-top-color:var(--cyan);background:var(--cyan);}
.stat-card.accent .stat-card-num,.stat-card.accent .stat-card-lbl{color:#fff}
.stat-card-num{font-size:26px;font-weight:800;color:#111;display:block;letter-spacing:-.5px}
.stat-card-lbl{font-family:var(--mono);font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;display:block}
.filters-bar{display:flex;align-items:flex-end;gap:1.25rem;padding:1rem 1.25rem;background:#fafafa;border:1px solid #e5e5e5;margin-bottom:1.5rem}
.filters-bar .field-label{font-size:10px}
.filters-bar .field-input,.filters-bar .field-select{font-size:12px}
.actions-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1.5px solid #111}
.actions-title{font-size:14px;font-weight:700;color:#111;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:.625rem}
.cnt-badge{font-family:var(--mono);font-size:11px;color:#888;font-weight:400}
.chip-ak{color:var(--cyan);border-color:var(--cyan)}
.chip-hz{color:var(--violet);border-color:var(--violet)}
/* PROJETS */
.pcard{background:#fff;border:1px solid #e5e5e5;border-top:3px solid #111;padding:1rem 1.125rem;margin-bottom:.75rem;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between}
.pcard-name{font-size:14px;font-weight:700;color:#111;cursor:pointer;display:flex;align-items:center;gap:.625rem;background:none;border:none;font-family:inherit;padding:0;text-align:left}
.pcard-cnt{font-family:var(--mono);font-size:10px;color:#888;background:#f5f5f5;border:1px solid #e5e5e5;padding:2px 7px}
.pcard-body{margin-top:.875rem;padding-top:.875rem;border-top:1px solid #e5e5e5;display:none}
.pcard-body.open{display:block}
.st-row{display:flex;align-items:center;justify-content:space-between;padding:.375rem 0;border-bottom:1px solid #f0f0f0;font-size:13px;color:#444}
.st-row:last-child{border-bottom:none}
.st-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);flex-shrink:0}
.st-name{display:flex;align-items:center;gap:.5rem;flex:1}
.add-il{display:flex;gap:.5rem;margin-top:.625rem}
.add-il input{flex:1;border:none;border-bottom:1.5px solid #ccc;padding:7px 0;font-size:12px;color:#111;background:transparent;outline:none;font-family:inherit}
.add-il input:focus{border-bottom-color:#111}
.add-il button{background:#111;color:#fff;border:none;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-il button:hover{background:#333}
.edit-il{display:flex;gap:.5rem;align-items:center;flex:1}
.edit-il input{flex:1;border:none;border-bottom:1.5px solid #ccc;padding:6px 0;font-size:12px;color:#111;background:transparent;outline:none;font-family:inherit}
.edit-il input:focus{border-bottom-color:#111}
</style>
</head>

const SB='https://qefpnyrumjacrznebtgf.supabase.co',KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZnBueXJ1bWphY3J6bmVidGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTU3MzgsImV4cCI6MjA5ODAzMTczOH0.IbupYWa_yv8M7Ypzui97Fw3pc1VZt_ZEHE2RQvRz6S4';
const H={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'};
const TODAY=new Date().toISOString().split('T')[0];
const WS=(()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split('T')[0]})();
const MS=TODAY.slice(0,7)+'-01';
async function sbGet(t,p){const r=await fetch(SB+'/rest/v1/'+t+(p||''),{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});if(!r.ok)throw new Error(await r.text());const tx=await r.text();return tx?JSON.parse(tx):[];}
async function sbPost(t,b){const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return[];}
async function sbPatch(t,b,p){const r=await fetch(SB+'/rest/v1/'+t+p,{method:'PATCH',headers:H,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return[];}
async function sbDel(t,p){const r=await fetch(SB+'/rest/v1/'+t+p,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());return[];}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){
  const w=document.getElementById('tw');if(!w)return;
  const el=document.createElement('div');
  el.style.cssText='background:#111;color:#fff;padding:.5rem .875rem;font-size:12px;border-left:3px solid '+(type==='err'?'#ef4444':'#4BBFE8')+';margin-top:.375rem;opacity:0;transform:translateY(4px);transition:all .2s';
  el.textContent=(type==='err'?'✕ ':'✓ ')+msg;
  w.appendChild(el);
  setTimeout(()=>{el.style.opacity='1';el.style.transform='translateY(0)';},10);
  setTimeout(()=>el.remove(),2600);
}
async function ping(){
  const dot=document.getElementById('sb-dot'),txt=document.getElementById('sb-txt');
  if(!dot)return;
  const t=Date.now();
  try{
    await fetch(SB+'/rest/v1/projects?select=id&limit=1',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const d=Date.now()-t;
    dot.style.background='#22c55e';dot.style.boxShadow='0 0 4px rgba(34,197,94,.4)';
    if(txt)txt.textContent='En ligne · '+d+'ms';
  }catch(e){if(dot)dot.style.background='#ef4444';if(txt)txt.textContent='Hors ligne';}
}

let ALL=[],PROJS=[],_tab='feed';

window.addEventListener('DOMContentLoaded',async()=>{
  ping();
  await Promise.all([loadAll(),loadProjects()]);
});

async function loadAll(){
  try{
    ALL=await sbGet('actions','?order=date.desc,created_at.desc&select=*,projects(name),subtasks(name)');
    updateStats(ALL);
    renderFeed();
  }catch(e){document.getElementById('feed-list').innerHTML='<div class="loading">Erreur</div>';}
}

function updateStats(acts){
  const ak=acts.filter(a=>a.who==='ak').length;
  const hz=acts.filter(a=>a.who==='hz').length;
  document.getElementById('st-total').textContent=acts.length;
  document.getElementById('st-ak').textContent=ak;
  document.getElementById('st-hz').textContent=hz;
  document.getElementById('h-total').textContent=acts.length;
  document.getElementById('h-ak').textContent=ak;
  document.getElementById('h-hz').textContent=hz;
  document.getElementById('cnt-feed').textContent=acts.length;
  document.getElementById('cnt-ak').textContent=ak;
  document.getElementById('cnt-hz').textContent=hz;
}

function switchTab(t,btn){
  _tab=t;
  document.querySelectorAll('.stab').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-feed').classList.toggle('hidden',t==='proj');
  document.getElementById('view-proj').classList.toggle('hidden',t!=='proj');
  if(t!=='proj')renderFeed();
  if(t==='proj')renderProjList();
}

function renderFeed(){
  const fd=document.getElementById('f-dt').value;
  const fp=document.getElementById('f-pr').value;
  let acts=[...ALL];
  if(_tab==='ak')acts=acts.filter(a=>a.who==='ak');
  else if(_tab==='hz')acts=acts.filter(a=>a.who==='hz');
  if(fd)acts=acts.filter(a=>a.date===fd);
  if(fp)acts=acts.filter(a=>a.project_id===fp);
  document.getElementById('feed-cnt').textContent=acts.length+' action'+(acts.length>1?'s':'');
  const el=document.getElementById('feed-list');
  if(!acts.length){el.innerHTML='<div class="empty"><span class="empty-icon">📭</span><div class="empty-title">Aucune action</div><div class="empty-sub">Modifiez les filtres ou ajoutez des actions</div></div>';return;}
  el.innerHTML='';
  acts.forEach((a,i)=>{
    const card=document.createElement('div');
    card.className='comm-card';
    card.style.animationDelay=(i*.04)+'s';
    const who=a.who==='ak'?'Abdelkader NAIM':'Hamza EL HAYJ';
    const chipCls=a.who==='ak'?'chip-ak':'chip-hz';
    card.innerHTML=
      '<div class="card-bloc">'+esc(a.projects?.name||'')+(a.subtasks?'<span>—</span>'+esc(a.subtasks.name):'')+'</div>'+
      '<div class="card-subject">'+esc(a.description.slice(0,80))+(a.description.length>80?'…':'')+'</div>'+
      '<div class="card-body">'+esc(a.description)+'</div>'+
      '<div class="card-footer">'+
        '<div class="card-tags">'+
          '<span class="tag '+chipCls+'">'+esc(who)+'</span>'+
          '<span class="tag tag-cyan">'+esc(a.projects?.name||'')+'</span>'+
          (a.subtasks?'<span class="tag tag-violet">'+esc(a.subtasks.name)+'</span>':'')+
        '</div>'+
        '<span class="card-date">'+a.date+'</span>'+
      '</div>';
    el.appendChild(card);
  });
}

function clearF(){
  document.getElementById('f-dt').value='';
  document.getElementById('f-pr').value='';
  renderFeed();
}

async function loadProjects(){
  try{
    PROJS=await sbGet('projects','?order=created_at.asc&select=*,subtasks(*)');
    const fp=document.getElementById('f-pr');
    fp.innerHTML='<option value="">Tous les projets</option>';
    PROJS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;fp.appendChild(o);});
  }catch(e){}
}

function renderProjList(){
  const el=document.getElementById('proj-list');
  if(!PROJS.length){el.innerHTML='<div class="empty"><div class="empty-title">Aucun projet</div></div>';return;}
  el.innerHTML='';
  PROJS.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='pcard';card.style.animationDelay=(i*.04)+'s';card.id='pc-'+p.id;
    card.innerHTML=
      '<div class="pcard-hdr">'+
        '<button class="pcard-name" onclick="togglePBody(\''+p.id+'\')">'+
          '▶ <span id="pn-'+p.id+'">'+esc(p.name)+'</span>'+
          '<span class="pcard-cnt">'+((p.subtasks||[]).length)+' sous-tâche'+((p.subtasks||[]).length!==1?'s':'')+'</span>'+
        '</button>'+
        '<div style="display:flex;gap:.375rem">'+
          '<button class="btn-ghost" onclick="startEP(\''+p.id+'\')">Modifier</button>'+
          '<button class="btn-ghost danger" onclick="delP(\''+p.id+'\')">✕</button>'+
        '</div>'+
      '</div>'+
      '<div id="pe-'+p.id+'" class="hidden" style="margin-top:.75rem">'+
        '<div class="edit-il"><input type="text" id="pei-'+p.id+'" value="'+esc(p.name)+'" onkeydown="if(event.key===\'Enter\')saveEP(\''+p.id+'\')">'+
          '<button class="btn-new" onclick="saveEP(\''+p.id+'\')">OK</button>'+
          '<button class="btn-ghost" onclick="cancelEP(\''+p.id+'\')">Annuler</button></div>'+
      '</div>'+
      '<div class="pcard-body" id="pb-'+p.id+'">'+
        ((p.subtasks||[]).map(st=>
          '<div class="st-row" id="str-'+st.id+'">'+
            '<div class="st-name"><div class="st-dot"></div><span id="stn-'+st.id+'">'+esc(st.name)+'</span></div>'+
            '<div id="ste-'+st.id+'" class="hidden edit-il" style="flex:1;margin-left:.5rem">'+
              '<input type="text" id="stei-'+st.id+'" value="'+esc(st.name)+'" onkeydown="if(event.key===\'Enter\')saveEST(\''+p.id+'\',\''+st.id+'\')">'+
              '<button class="btn-new" onclick="saveEST(\''+p.id+'\',\''+st.id+'\')">OK</button>'+
              '<button class="btn-ghost" onclick="cancelEST(\''+st.id+'\')">Annuler</button></div>'+
            '<div style="display:flex;gap:.25rem;margin-left:.5rem">'+
              '<button class="btn-ghost" onclick="startEST(\''+st.id+'\')">Modifier</button>'+
              '<button class="btn-ghost danger" onclick="delST(\''+p.id+'\',\''+st.id+'\')">✕</button>'+
            '</div>'+
          '</div>'
        ).join(''))+
        '<div class="add-il"><input type="text" id="nst-'+p.id+'" placeholder="Nouvelle sous-tâche…" onkeydown="if(event.key===\'Enter\')addST(\''+p.id+'\')"><button onclick="addST(\''+p.id+'\')">+ Ajouter</button></div>'+
      '</div>';
    el.appendChild(card);
  });
}

function togglePBody(pid){const el=document.getElementById('pb-'+pid);el.classList.toggle('open');}
function showAddProj(){document.getElementById('add-proj-box').classList.remove('hidden');document.getElementById('np-in').focus();}
function hideAddProj(){document.getElementById('add-proj-box').classList.add('hidden');document.getElementById('np-in').value='';}
async function saveNP(){const n=(document.getElementById('np-in').value||'').trim();if(!n)return;try{await sbPost('projects',{id:uid(),name:n});toast('Projet créé');hideAddProj();await loadProjects();renderProjList();}catch(e){toast('Erreur','err');}}
function startEP(pid){document.querySelector('#pc-'+pid+' .pcard-name').style.opacity='.3';document.getElementById('pe-'+pid).classList.remove('hidden');document.getElementById('pei-'+pid).focus();}
function cancelEP(pid){document.querySelector('#pc-'+pid+' .pcard-name').style.opacity='';document.getElementById('pe-'+pid).classList.add('hidden');}
async function saveEP(pid){const v=(document.getElementById('pei-'+pid).value||'').trim();if(!v)return;try{await sbPatch('projects',{name:v},'?id=eq.'+pid);toast('Modifié');await loadProjects();renderProjList();}catch(e){toast('Erreur','err');}}
async function delP(pid){if(!confirm('Supprimer ce projet ?'))return;try{await sbDel('projects','?id=eq.'+pid);toast('Supprimé');await loadProjects();renderProjList();}catch(e){toast('Erreur','err');}}
async function addST(pid){const inp=document.getElementById('nst-'+pid);const n=(inp.value||'').trim();if(!n)return;try{await sbPost('subtasks',{id:uid(),project_id:pid,name:n});toast('Sous-tâche ajoutée');inp.value='';await loadProjects();renderProjList();setTimeout(()=>document.getElementById('pb-'+pid).classList.add('open'),80);}catch(e){toast('Erreur','err');}}
function startEST(stid){document.getElementById('stn-'+stid).parentElement.classList.add('hidden');document.getElementById('ste-'+stid).classList.remove('hidden');document.getElementById('stei-'+stid).focus();}
function cancelEST(stid){document.getElementById('stn-'+stid).parentElement.classList.remove('hidden');document.getElementById('ste-'+stid).classList.add('hidden');}
async function saveEST(pid,stid){const v=(document.getElementById('stei-'+stid).value||'').trim();if(!v)return;try{await sbPatch('subtasks',{name:v},'?id=eq.'+stid);toast('Modifiée');await loadProjects();renderProjList();setTimeout(()=>document.getElementById('pb-'+pid).classList.add('open'),80);}catch(e){toast('Erreur','err');}}
async function delST(pid,stid){if(!confirm('Supprimer ?'))return;try{await sbDel('subtasks','?id=eq.'+stid);toast('Supprimée');await loadProjects();renderProjList();setTimeout(()=>document.getElementById('pb-'+pid).classList.add('open'),80);}catch(e){toast('Erreur','err');}}
</script>
</body></html>
